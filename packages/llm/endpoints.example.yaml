#   env:
#     CLAUDE_CODE_EFFORT_LEVEL: max
#     CLAUDE_CODE_NO_FLICKER: "1"
#     ENABLE_TOOL_SEARCH: "false"
#   args:
#     - --dangerously-skip-permissions
#     - --teammate-mode
#     - in-process
