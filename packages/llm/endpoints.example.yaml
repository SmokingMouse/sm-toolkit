providers:
  claude:
    api_key_env: ANTHROPIC_API_KEY
    models:
      - claude-opus-4-6[1m]
      - claude-opus-4-8

  deepseek:
    api_key_env: DEEPSEEK_API_KEY
    openai_url: https://api.deepseek.com/v1
    anthropic_url: https://api.deepseek.com/anthropic
    models:
      - deepseek-v4-flash
      - deepseek-v4-pro

  gemini:
    api_key_env: GEMINI_API_KEY
    openai_url: https://generativelanguage.googleapis.com/v1beta/openai
    models:
      - gemini-2.5-flash

  # provider 级 claude: 块示例——env 覆盖顶层 claude: 的同名项（优先级：
  # 自动推导 < 全局 < provider），args 追加其后。provider 级 env 跟 endpoint
  # 走：llm 交互 launch 和 @sm/agent ClaudeBackend（headless）都注入
  kimi:
    api_key_env: KIMI_API_KEY
    anthropic_url: https://api.kimi.com/coding
    models:
      - k3
      - kimi-for-coding-highspeed
      - kimi-for-coding
    claude:
      env:
        ANTHROPIC_DEFAULT_FABLE_MODEL: k3
        ANTHROPIC_DEFAULT_OPUS_MODEL: kimi-for-coding-highspeed
        ANTHROPIC_DEFAULT_SONNET_MODEL: kimi-for-coding-highspeed
        ANTHROPIC_DEFAULT_HAIKU_MODEL: kimi-for-coding
        ANTHROPIC_SMALL_FAST_MODEL: kimi-for-coding-highspeed
        CLAUDE_CODE_SUBAGENT_MODEL: k3
        CLAUDE_CODE_MAX_CONTEXT_TOKENS: "1048576"
        CLAUDE_CODE_AUTO_COMPACT_WINDOW: "1048576"
        # kimi 只认 Bearer（AUTH_TOKEN），清掉推导出的 API_KEY 防 x-api-key 冲突
        ANTHROPIC_API_KEY: ""

  ark-coding:
    api_key_env: ARK_CODING_API_KEY
    anthropic_url: https://ark.cn-beijing.volces.com/api/coding
    openai_url: https://ark.cn-beijing.volces.com/api/coding/v3
    models:
      - ark-code-latest
      - doubao-seed-2.0-code
      - doubao-seed-2.0-pro
      - doubao-seed-2.0-lite
      - doubao-seed-code
      - glm-5.2
      - kimi-k2.7-code
      - minimax-m3
      - deepseek-v4-flash
      - deepseek-v4-pro
      - minimax-m2.7
      - kimi-k2.6

default: deepseek-v4-flash
env_file: ~/.agent-gateway.env

# 可选：llm 启动 claude 交互 session 时的附加 env / 参数（全局层）。
# 代理 endpoint 已自动推导 ANTHROPIC_MODEL / DEFAULT_{OPUS,SONNET,HAIKU,FABLE}_MODEL /
# SMALL_FAST tier 映射、API_TIMEOUT_MS、CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC。
# 优先级：自动推导 < 这里的全局 env < provider 级 claude.env（见上方 kimi 示例）。
# claude:
#   env:
#     CLAUDE_CODE_EFFORT_LEVEL: max
#     CLAUDE_CODE_NO_FLICKER: "1"
#     ENABLE_TOOL_SEARCH: "false"
#   args:
#     - --dangerously-skip-permissions
#     - --teammate-mode
#     - in-process
